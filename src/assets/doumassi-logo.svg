<svg viewBox="0 0 540 95" xmlns="http://www.w3.org/2000/svg">
  <!-- DOUMASSI bold text -->
  <text
    x="2" y="72"
    font-family="'Arial Black', 'Impact', 'Helvetica Neue', sans-serif"
    font-weight="900"
    font-size="50"
    fill="white"
    letter-spacing="1"
  >DOUMASSI</text>

  <!-- Circuit connector lines -->
  <!-- Bottom horizontal line from mid-text -->
  <line x1="148" y1="77" x2="228" y2="77" stroke="white" stroke-width="1.8"/>
  <!-- Small dot at horizontal/diagonal junction -->
  <circle cx="228" cy="77" r="3.5" fill="white"/>
  <!-- Diagonal going up-right -->
  <line x1="228" y1="77" x2="358" y2="20" stroke="white" stroke-width="1.8"/>
  <!-- Top horizontal line -->
  <line x1="358" y1="20" x2="438" y2="20" stroke="white" stroke-width="1.8"/>
  <!-- Medium dot at top-left corner -->
  <circle cx="358" cy="20" r="4" fill="white"/>
  <!-- Large filled circle at top-right terminal -->
  <circle cx="452" cy="20" r="8" fill="white"/>

  <!-- Ai text -->
  <text
    x="350" y="84"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-weight="700"
    font-style="italic"
    font-size="60"
    fill="white"
  >Ai</text>
</svg>
